<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries -->
    <script src="jquery371.min.js"></script>
    <script src="chartjs.js"></script>
</head>

<body>
    <div class="appContainer">

        <h1 class="appTitle">🏠 Smart Home Dashboard</h1>

        <!-- Lights Control -->
        <div class="card">
            <h2>💡 Lights Control</h2>
            <div id="switchButtons" class="switchGrid"></div>
        </div>

        <!-- Settings -->
        <div class="card">
            <h2>⚙️ Settings</h2>

            <div class="formGroup">
                <label>Select Room</label>
                <select id="lightCfgSelRoom" class="inputField">
                    <option value="">No selection</option>
                </select>
            </div>

            <div id="lightCfgSettingsForm"></div>
        </div>

        <!-- Usage Stats -->
        <div class="card">
            <h2>📊 Usage Statistics</h2>

            <div class="formGroup">
                <label>Select Room</label>
                <select id="lightUsageSelRoom" class="inputField">
                    <option value="">No selection</option>
                </select>
            </div>

            <div id="lightUsageStatsChart" class="chartGrid"></div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="lightUsageChart.js"></script>
    <script src="index.js"></script>
</body>
</html>
