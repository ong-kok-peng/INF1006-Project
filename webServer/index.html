<html>
    <head>
        <meta charset="UTF-8">
        <title>Home Automation Lights Dashboard</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- CSS -->
        <link rel="stylesheet" href="index.css">
        <!-- Libraries -->
        <script src="jquery371.min.js"></script>
        <script src="chartjs.js"></script>
    </head>
    <body>
        <div class="appContainer">
            <h1 class="appTitle">🏠 Smart Home Dashboard</h1>

            <div class="subContainer">
                <p class="subContainerRow" style="font-weight: bold;">💡 Lights control</p>
                <p class="subContainerRow" id="switchBtnsGrid">
                    <!-- Each room switch button row populates here-->
                </p>
            </div>

            <div class="subContainer">
                <p class="subContainerRow" style="font-weight: bold;">⚙️ Lights control settings</p>
                <p class="subContainerRow">
                    <label>Select room: </label>
                    <select id="lightCfgSelRoom" class="userInput">
                        <option value="">No selection</option>
                        <!-- Each room selection option populates here-->
                    </select>
                </p>
                <div class="subContainerRow" id="lightCfgSettingsForm">
                    <!-- Each settings field populates here-->
                </div>
            </div>

            <div class="subContainer">
                <p class="subContainerRow" style="font-weight: bold;">📊 Lights usage statistics</p>
                <p class="subContainerRow">
                    <label>Select room: </label>
                    <select id="lightUsageSelRoom" class="userInput">
                        <option value="">No selection</option>
                        <!-- Each room selection option populates here-->
                    </select>
                </p>
                <div class="subContainerRow" id="lightUsageStatsChart">
                    <!-- Light usage charts display here-->
                </div>
            </div>

        </div>
        <!-- local javascript at the end of body -->
        <script src="lightUsageChart.js"></script>
        <script src="index.js"></script>
    </body>
</html>
