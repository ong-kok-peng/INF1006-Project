<html>

        <style>
            /* put the css here */

        <div class="mainContainer">
            <div class="subContainer" id="lightCtrlSwitches">
                <p>Lights remote control</p>

                    <label>Room 1</label><button>Turn On</button>

                        </select>
                    </p>
                </div>
            </div>
        </div>
